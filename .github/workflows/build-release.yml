name: Build and Release Orby

on:
  push:
    tags:
      - 'v*'
    branches:
      - release

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Orby.app
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0"
          fi
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION  Build: $BUILD_NUMBER"

      - name: Set version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.build }}" Info.plist

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Orby (Release, Universal Binary)
        run: |
          xcodebuild \
            -project Orby.xcodeproj \
            -scheme Orby \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Sign and verify app bundle
        run: |
          APP_PATH="build/Build/Products/Release/Orby.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Orby.app not found in Release directory"
            find build -name "Orby.app" -type d 2>/dev/null
            exit 1
          fi

          # Deep re-sign to ensure all nested binaries are signed
          codesign --force --deep -s - "$APP_PATH"

          echo "=== Signature ==="
          codesign -dvv "$APP_PATH" 2>&1
          echo "=== Verify ==="
          codesign --verify --deep --strict "$APP_PATH" 2>&1
          echo "=== Architectures ==="
          file "$APP_PATH/Contents/MacOS/Orby"

      - name: Create DMG (drag-and-drop installer)
        run: |
          APP_PATH="build/Build/Products/Release/Orby.app"

          # create-dmg produces a styled DMG with:
          #   - Applications symlink for drag-and-drop
          #   - Fixed window size and icon positions
          #   - App icon and volume icon
          # It returns exit code 2 when no signing identity is available
          # for the DMG itself, but the DMG is still created successfully.
          create-dmg \
            --volname "Orby" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "Orby.app" 160 200 \
            --hide-extension "Orby.app" \
            --app-drop-link 500 200 \
            "Orby-macOS.dmg" \
            "$APP_PATH" \
            || test $? -eq 2

      - name: Create ZIP archive
        run: |
          cd build/Build/Products/Release
          zip -r -y "../../../../Orby-macOS.zip" Orby.app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orby-macOS
          path: |
            Orby-macOS.zip
            Orby-macOS.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Orby ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            Orby-macOS.zip
            Orby-macOS.dmg

      - name: Create Pre-release (from release branch)
        if: github.ref == 'refs/heads/release' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Orby Pre-release (${{ steps.version.outputs.build }})
          tag_name: pre-${{ steps.version.outputs.build }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            Orby-macOS.zip
            Orby-macOS.dmg
