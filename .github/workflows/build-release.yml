name: Build and Release Orby

on:
  push:
    tags:
      - 'v*'
    branches:
      - release

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Orby.app
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Orby
        run: |
          xcodebuild \
            -project Orby.xcodeproj \
            -scheme Orby \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package Orby.app
        run: |
          APP_PATH="build/Build/Products/Release/Orby.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Orby.app not found at $APP_PATH"
            find build -name "Orby.app" -type d
            exit 1
          fi

          # Create zip archive
          cd build/Build/Products/Release
          zip -r -y "../../../../Orby-macOS.zip" Orby.app
          cd ../../../../

          # Create DMG
          hdiutil create -volname "Orby" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "Orby-macOS.dmg"

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "version=0.0.0-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "tag=nightly-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orby-macOS
          path: |
            Orby-macOS.zip
            Orby-macOS.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Orby ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            Orby-macOS.zip
            Orby-macOS.dmg

      - name: Create Pre-release (from release branch)
        if: github.ref == 'refs/heads/release' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Orby ${{ steps.version.outputs.version }} (Pre-release)
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            Orby-macOS.zip
            Orby-macOS.dmg
