name: Build and Release Orby Pro

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Orby Pro
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0"
          fi
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION  Build: $BUILD_NUMBER"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Orby (Release, Universal Binary)
        run: |
          xcodebuild \
            -project Orby.xcodeproj \
            -scheme Orby \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}" \
            build

      - name: Sign and verify app bundle
        run: |
          APP_PATH="build/Build/Products/Release/Orby.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Orby.app not found in Release directory"
            find build -name "Orby.app" -type d 2>/dev/null
            exit 1
          fi
          codesign --force --deep -s - "$APP_PATH"
          echo "=== Signature ==="
          codesign -dvv "$APP_PATH" 2>&1
          echo "=== Verify ==="
          codesign --verify --deep --strict "$APP_PATH" 2>&1
          echo "=== Architectures ==="
          file "$APP_PATH/Contents/MacOS/Orby"

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/Orby.app"
          create-dmg \
            --volname "Orby Pro" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "Orby.app" 160 200 \
            --hide-extension "Orby.app" \
            --app-drop-link 500 200 \
            "Orby-Pro-macOS.dmg" \
            "$APP_PATH" \
            || test $? -eq 2

      - name: Create ZIP archive
        run: |
          cd build/Build/Products/Release
          zip -r -y "../../../../Orby-Pro-macOS.zip" Orby.app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orby-Pro-macOS
          path: |
            Orby-Pro-macOS.zip
            Orby-Pro-macOS.dmg

      # Release to the PUBLIC orby repo (binary-only, no source code leak)
      - name: Publish release to public repo
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"

          # Delete existing release if any
          gh release delete "$VERSION" --repo dxiongya/orby --yes 2>/dev/null || true
          # Delete existing tag if any
          gh api repos/dxiongya/orby/git/refs/tags/"$VERSION" -X DELETE 2>/dev/null || true

          gh release create "$VERSION" \
            --repo dxiongya/orby \
            --title "Orby Pro $VERSION" \
            --notes-file - \
            Orby-Pro-macOS.dmg \
            Orby-Pro-macOS.zip <<'NOTES'
          ## Installation

          1. Download `Orby-Pro-macOS.dmg` or `Orby-Pro-macOS.zip`
          2. Open the DMG and drag **Orby.app** to Applications, or unzip and move to Applications
          3. Launch Orby — grant Accessibility and Screen Recording permissions when prompted

          **Requirements:** macOS 13.0 (Ventura) or later
          NOTES
